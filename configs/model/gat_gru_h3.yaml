model:
  name: gat_gru_h3

  graph:
    type: connect

  input:
    history_length: 12
    input_dim: 1

  spatial:
    type: gat
    hidden_dim: 16
    heads: 1

  temporal:
    type: gru
    hidden_dim: 32
    num_layers: 1

  regularization:
    dropout: 0.10

  output:
    output_dim: 1
    predict_steps: 3
    head_type: horizon_mlp
    pred_hidden_dim: 64
    horizon_emb_dim: 8
    dropout: 0.10
    use_last_value_residual: true
